{% extends "base.html" %}

{% block title %}Edit Invoice - Kharsan Constructions{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-edit"></i> Edit Invoice</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('edit_invoice', id=invoice['invoice_id']) }}" method="post">
                    <div class="mb-3">
                        <label for="project_id" class="form-label">Project ID</label>
                        <input type="number" class="form-control" id="project_id" name="project_id" value="{{ invoice['project_id'] }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="total_cost" class="form-label">Total Cost</label>
                        <input type="number" step="0.01" class="form-control" id="total_cost" name="total_cost" value="{{ invoice['total_cost'] }}" min="0" required>
                    </div>
                    <div class="mb-3">
                        <label for="amount_paid" class="form-label">Amount Paid</label>
                        <input type="number" step="0.01" class="form-control" id="amount_paid" name="amount_paid" value="{{ invoice['amount_paid'] }}" min="0">
                    </div>
                    <div class="mb-3">
                        <label for="payment_status" class="form-label">Payment Status</label>
                        <select class="form-select" id="payment_status" name="payment_status">
                            <option value="pending" {% if invoice['payment_status'] == 'pending' %}selected{% endif %}>Pending</option>
                            <option value="paid" {% if invoice['payment_status'] == 'paid' %}selected{% endif %}>Paid</option>
                            <option value="overdue" {% if invoice['payment_status'] == 'overdue' %}selected{% endif %}>Overdue</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Invoice</button>
                    <a href="{{ url_for('finances') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
