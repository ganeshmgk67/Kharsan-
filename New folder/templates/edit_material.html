{% extends "base.html" %}

{% block title %}Edit Material - Kharsan Constructions{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-edit"></i> Edit Material</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('edit_material', id=material['material_id']) }}" method="post">
                    <div class="mb-3">
                        <label for="project_id" class="form-label">Project ID</label>
                        <input type="number" class="form-control" id="project_id" name="project_id" value="{{ material['project_id'] }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label">Material Name</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ material['name'] }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="supplier_name" class="form-label">Supplier Name</label>
                        <input type="text" class="form-control" id="supplier_name" name="supplier_name" value="{{ material['supplier_name'] }}">
                    </div>
                    <div class="mb-3">
                        <label for="quantity_used" class="form-label">Quantity Used</label>
                        <input type="number" class="form-control" id="quantity_used" name="quantity_used" value="{{ material['quantity_used'] }}" min="0">
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Material</button>
                    <a href="{{ url_for('materials') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
