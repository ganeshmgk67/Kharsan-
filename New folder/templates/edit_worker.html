{% extends "base.html" %}

{% block title %}Edit Worker - Kharsan Constructions{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-edit"></i> Edit Worker</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('edit_worker', id=worker['worker_id']) }}" method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">Worker Name</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ worker['name'] }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">Role</label>
                        <input type="text" class="form-control" id="role" name="role" value="{{ worker['role'] }}" placeholder="e.g., Engineer, Laborer">
                    </div>
                    <div class="mb-3">
                        <label for="assigned_project_id" class="form-label">Assigned Project ID</label>
                        <input type="number" class="form-control" id="assigned_project_id" name="assigned_project_id" value="{{ worker['assigned_project_id'] }}">
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Worker</button>
                    <a href="{{ url_for('labor') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
