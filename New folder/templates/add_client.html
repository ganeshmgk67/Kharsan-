{% extends "base.html" %}

{% block title %}Add Client - Kharsan Constructions{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-plus"></i> Add New Client</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('add_client') }}" method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">Client Name</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="contact_info" class="form-label">Contact Info</label>
                        <input type="text" class="form-control" id="contact_info" name="contact_info" placeholder="Phone or Email">
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Client</button>
                    <a href="{{ url_for('clients') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
