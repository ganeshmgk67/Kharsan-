{% extends "base.html" %}

{% block title %}Add Invoice - Kharsan Constructions{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-plus"></i> Add New Invoice</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('add_invoice') }}" method="post">
                    <div class="mb-3">
                        <label for="project_id" class="form-label">Project ID</label>
                        <input type="number" class="form-control" id="project_id" name="project_id" required>
                    </div>
                    <div class="mb-3">
                        <label for="total_cost" class="form-label">Total Cost</label>
                        <input type="number" step="0.01" class="form-control" id="total_cost" name="total_cost" min="0" required>
                    </div>
                    <div class="mb-3">
                        <label for="amount_paid" class="form-label">Amount Paid</label>
                        <input type="number" step="0.01" class="form-control" id="amount_paid" name="amount_paid" min="0">
                    </div>
                    <div class="mb-3">
                        <label for="payment_status" class="form-label">Payment Status</label>
                        <select class="form-select" id="payment_status" name="payment_status">
                            <option value="pending">Pending</option>
                            <option value="paid">Paid</option>
                            <option value="overdue">Overdue</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Invoice</button>
                    <a href="{{ url_for('finances') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
